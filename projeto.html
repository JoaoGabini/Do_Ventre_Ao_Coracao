<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbacks e Grupo no Whatsapp</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    background-color:#ddc8ea;
}

.slide{
    min-height:100vh;
    padding:50px;
    background:linear-gradient(
        rgba(244,205,241,.95),
        rgba(232,223,236,.95)
    );
}

/* TÍTULO */

h1{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;

    text-align:center;
    font-size:4rem;
    color:#2d2d2d;

    margin-top:50px;
    margin-bottom:80px;
}

.decoracao-titulo{
    width:220px;
    height:auto;
    opacity:.8;
}

.direita{
    transform:scaleX(-1);
}

/* CONTEÚDO */

.conteudo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:80px;
    flex-wrap:wrap;
}

.logo img{
    width:250px;
    border-radius:100px;
}

.whatsapp{
    max-width:500px;
}

.whatsapp a{
    font-size:2rem;
    color:#222;
    font-style:italic;
    font-weight:bold;
    text-decoration:underline;
}

.contato{
    margin-top:120px;
    text-align:center;
}

.contato h2{
    font-size:3rem;
    color:#222;
    margin-bottom:20px;
}

.contato p{
    font-size:1.3rem;
    margin:10px 0;
}



</style>
</head>

<body>

<div class="slide">

  

    <h1>
        <img src="decoracao.png" class="decoracao-titulo" alt="">

        Feedbacks e grupo no Whatsapp

        <img src="decoracao.png" class="decoracao-titulo direita" alt="">
    </h1>

    <div class="conteudo">

        <div class="logo">
            <img src="ventre.jpg" alt="Logo Do Ventre ao Coração">
        </div>

        <div class="whatsapp">
            <a href="https://chat.whatsapp.com/F2ov3UbGYk28FQdKkNORvt">
                Acesse nosso grupo do Whatsapp<br>
                clicando na nossa logo!
            </a>
        </div>

    </div>

    <div class="contato">
        <h2>Entre em contato conosco:</h2>

        <p><strong>E-mail:</strong> doventre.aocoracao30@gmail.com</p>

        <p><strong>Grupo de WhatsApp:</strong> Raízes do Ventre ao Coração</p>

        <p><strong>Instagram:</strong> @doventreaocoracao</p>
    </div>

</div>

</html>
