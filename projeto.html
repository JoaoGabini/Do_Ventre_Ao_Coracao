<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbacks e Grupo no Whatsapp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Georgia, serif;
    background-color:#f8f5fa;
}

.slide{
    min-height:100vh;
    padding:50px;
    background:linear-gradient(
        rgba(255,255,255,0.95),
        rgba(245,240,248,0.95)
    );
}

h1{
    text-align:center;
    font-size:4rem;
    color:#2d2d2d;
    margin-bottom:80px;
}

.conteudo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:80px;
    flex-wrap:wrap;
}

.logo img{
    width:250px;
}

.whatsapp{
    max-width:500px;
}

.whatsapp a{
    font-size:2rem;
    color:#222;
    font-style:italic;
    font-weight:bold;
    text-decoration:underline;
}

.contato{
    margin-top:120px;
    text-align:center;
}

.contato h2{
    font-size:3rem;
    color:#222;
    margin-bottom:20px;
}

.contato p{
    font-size:1.3rem;
    margin:10px 0;
}

.decoracao-esq{
    position:fixed;
    left:0;
    bottom:0;
    width:180px;
    opacity:.3;
}

.decoracao-dir{
    position:fixed;
    right:0;
    top:250px;
    width:180px;
    opacity:.3;
}
</style>

</head>
<body>

<div class="slide">

    <h1>Feedbacks e grupo no Whatsapp</h1>

    <div class="conteudo">

        <div class="logo">
            <img src="logo.png" alt="Logo Do Ventre ao Coração">
        </div>

        <div class="whatsapp">
            <a href="#">
                Acesse nosso grupo do Whatsapp<br>
                clicando na nossa logo!
            </a>
        </div>

    </div>

    <div class="contato">
        <h2>Entre em contato conosco:</h2>

        <p><strong>E-mail:</strong> doventreaocoracao30@gmail.com</p>

        <p><strong>Grupo de WhatsApp:</strong> Raízes do Ventre ao Coração</p>

        <p><strong>Instagram:</strong> @doventreaocoracao</p>
    </div>

</div>

</body>
</html>
